<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 148" width="200" height="148">
  <defs>
    <linearGradient id="tentLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#6fc464"/>
      <stop offset="100%" stop-color="#3d8a32"/>
    </linearGradient>
    <linearGradient id="tentRight" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3d8a32"/>
      <stop offset="100%" stop-color="#1e4d18"/>
    </linearGradient>
    <linearGradient id="doorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#a8d8a0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2e6b25"  stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="groundShadow" cx="50%" cy="30%" r="50%">
      <stop offset="0%"   stop-color="#1a3d14" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a3d14" stop-opacity="0"/>
    </radialGradient>
    <filter id="tentShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#1a4014" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="110" rx="88" ry="6" fill="#7bc96e" opacity="0.35"/>
  <ellipse cx="100" cy="110" rx="68" ry="4" fill="url(#groundShadow)"/>

  <!-- TENT -->
  <g filter="url(#tentShadow)">

    <!-- Back face -->
    <polygon points="100,36  22,106  178,106" fill="#245e1c" opacity="0.55"/>

    <!-- Left fly panel -->
    <polygon points="100,36  14,106  100,106" fill="url(#tentLeft)"/>

    <!-- Right fly panel -->
    <polygon points="100,36  100,106  186,106" fill="url(#tentRight)"/>

    <!-- Base line -->
    <line x1="14" y1="106" x2="186" y2="106"
          stroke="#1e4d18" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Front vestibule / door -->
    <polygon points="100,28  60,106  140,106" fill="url(#doorGrad)"
             stroke="#3d8a32" stroke-width="0.8"/>
    <polygon points="100,28  60,106  140,106" fill="none"
             stroke="#5aab4e" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>

    <!-- Mesh slats inside door -->
    <line x1="74"  y1="80"  x2="126" y2="80"  stroke="#a8d8a0" stroke-width="0.7" opacity="0.7"/>
    <line x1="67"  y1="91"  x2="133" y2="91"  stroke="#a8d8a0" stroke-width="0.7" opacity="0.7"/>
    <line x1="61"  y1="100" x2="139" y2="100" stroke="#a8d8a0" stroke-width="0.7" opacity="0.6"/>

    <!-- Zipper line -->
    <line x1="100" y1="32" x2="100" y2="106"
          stroke="#c8ecc4" stroke-width="0.9" stroke-dasharray="2.5,2" opacity="0.75"/>

    <!-- Pole highlights -->
    <line x1="14"  y1="106" x2="100" y2="36"
          stroke="#f0f8ee" stroke-width="1.1" stroke-linecap="round" opacity="0.4"/>
    <line x1="186" y1="106" x2="100" y2="36"
          stroke="#f0f8ee" stroke-width="1.1" stroke-linecap="round" opacity="0.4"/>

    <!-- Guy lines & stakes -->
    <line x1="14"  y1="106" x2="46"  y2="115" stroke="#c8a84b" stroke-width="0.9" opacity="0.85"/>
    <line x1="46"  y1="115" x2="44"  y2="120" stroke="#8b6914" stroke-width="1.3" stroke-linecap="round"/>

    <line x1="186" y1="106" x2="154" y2="115" stroke="#c8a84b" stroke-width="0.9" opacity="0.85"/>
    <line x1="154" y1="115" x2="156" y2="120" stroke="#8b6914" stroke-width="1.3" stroke-linecap="round"/>

    <line x1="100" y1="28"  x2="100" y2="118" stroke="#c8a84b" stroke-width="0.8" opacity="0.65"/>
    <line x1="100" y1="118" x2="100" y2="123" stroke="#8b6914" stroke-width="1.3" stroke-linecap="round"/>

  </g>

  <!-- Ground line -->
  <line x1="10" y1="110" x2="190" y2="110" stroke="#4a7a40" stroke-width="1" opacity="0.35"/>

  <!-- Grass tufts -->
  <g stroke="#5c9e50" stroke-width="1.2" stroke-linecap="round" opacity="0.65">
    <line x1="20"  y1="110" x2="18"  y2="105"/>
    <line x1="24"  y1="110" x2="25"  y2="105"/>
    <line x1="174" y1="110" x2="172" y2="105"/>
    <line x1="178" y1="110" x2="179" y2="105"/>
    <line x1="54"  y1="110" x2="53"  y2="106"/>
    <line x1="146" y1="110" x2="147" y2="106"/>
  </g>

  <!-- WORDMARK – single line -->
  <text
    x="100" y="136"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="17"
    letter-spacing="3"
    fill="#2e6b25"
  ><tspan font-weight="400" fill="#3d8a32">Camp</tspan><tspan font-weight="700">Finder</tspan></text>

  <!-- Underline rule -->
  <line x1="44" y1="141" x2="156" y2="141"
        stroke="#5aab4e" stroke-width="0.75" opacity="0.45"/>

</svg>
